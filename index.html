<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Table</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>IP Table</h1>
    <div class="table-container">
        <form id="add-ip" autocomplete="off">
            <input type="text" name="ip" placeholder="IP" required>
            <input type="text" name="mask" placeholder="Mask" required>
            <input type="text" name="version" placeholder="Version" required>
            <button type="submit">Add</button>
        </form>
        <table id="iptable">
            <thead>
                <tr>
                    <th>IP</th>
                    <th>Mask</th>
                    <th>Version</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
